spring.application.name=file-manager-service
server.port=8082

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

s3.endpoint=https://YOUR_REGION.digitaloceanspaces.com
s3.bucket=YOUR_BUCKET_NAME
s3.access.key=${S3_ACCESS_KEY}
s3.secret.key=${S3_SECRET_KEY}

soap.service.url=https://user-soap-service-fcqlw.ondigitalocean.app/ws